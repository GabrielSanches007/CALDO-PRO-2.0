<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caldos Pro - Ember Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ember-background">
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="spark"></div>
    <div class="spark"></div>
</div>

<div class="app-container">
    <header class="app-header">
        <div class="brand">
            <h1>Caldos<span>PRO</span></h1>
            <p id="dia">--/--/----</p>
        </div>
        <div class="status-badge"><i class="fa-solid fa-fire-flame-curved"></i> Operação Viva</div>
    </header>

    <section class="ember-dashboard">
        <div class="revenue-card">
            <small class="label">FATURAMENTO HOJE</small>
            <h2 id="fat">R$ 0,00</h2>
            <div class="profit-badge">
                <i class="fa-solid fa-chart-line"></i> Lucro Estimado: <span id="lucro">R$ 0,00</span>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <i class="fa-solid fa-hand-holding-dollar"></i>
                <small>Ticket Médio</small>
                <b id="ticket-medio">R$ 0,00</b>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <small>Pico</small>
                <b id="hora-pico">--:--</b>
            </div>
        </div>
    </section>

    <h3 class="section-title"><i class="fa-solid fa-soup"></i> Cardápio e Vendas</h3>
    <div id="produtos" class="sales-grid"></div>

    <section class="ember-card cart-section">
        <div class="card-header">
            <h3><i class="fa-solid fa-basket-shopping"></i> Carrinho</h3>
            <span id="cart-count" class="badge-count">0</span>
        </div>
        <div id="carrinhoContainer" class="cart-items"></div>
        <button id="btnVenderTudo" onclick="abrirConfirmacao()" class="btn-checkout" disabled>
            FINALIZAR PEDIDO <i class="fa-solid fa-arrow-right"></i>
        </button>
    </section>

    <section class="ember-card management-section">
        <h3><i class="fa-solid fa-sliders"></i> Gestão de Itens e Preços</h3>
        <div id="lista-gestao-produtos" class="management-list"></div>
        <button onclick="adicionarNovoProduto()" class="btn-add-outline">
            <i class="fa-solid fa-plus-circle"></i> ADICIONAR NOVO ITEM
        </button>
    </section>

    <footer class="ember-card settings-footer">
        <div class="input-group">
            <i class="fa-brands fa-whatsapp"></i>
            <input id="wa" type="text" placeholder="WhatsApp p/ Relatórios (55...)">
        </div>
        <button onclick="resetarDia()" class="btn-reset">🔄 ZERAR DIA E ESTOQUE VENDIDO</button>
    </footer>
</div>

<div id="modalConfirmacao" class="modal-overlay">
    <div class="modal-box animate-popIn">
        <i class="fa-solid fa-circle-question" style="font-size: 3rem; color: #f97316;"></i>
        <h2>Confirmar Venda?</h2>
        <div id="resumoFinal" class="resumo-scroll"></div>
        <div class="modal-actions">
            <button onclick="venderCarrinho()" class="btn-checkout">CONFIRMAR ✅</button>
            <button onclick="fecharConfirmacao()" class="btn-add-outline" style="border-color:#444; color:#aaa;">CORRIGIR ❌</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
